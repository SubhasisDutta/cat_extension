<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <link rel="icon" type="image/png" sizes="32x32" href="icons/icon-32.png" />
    <link rel="icon" type="image/svg+xml" href="icons/logo.svg" />
    <link rel="stylesheet" href="popup.css" />
  </head>
  <body>
    <header>
      <img class="logo" src="icons/icon-48.png" alt="Fat Orange Cat" width="32" height="32" />
      <div class="header-text">
        <div class="title">FAT ORANGE CAT</div>
        <div class="subtitle">he is unbothered.</div>
      </div>
    </header>

    <section class="status">
      <div class="phase" data-phase>—</div>
      <div class="countdown" data-countdown>--:--</div>
      <div class="meta" data-meta></div>
    </section>

    <section class="controls">
      <label class="row">
        <span>Work block (minutes)</span>
        <input type="number" min="1" max="120" step="1" data-work-input />
      </label>
      <button data-save>Save</button>

      <label class="row toggle">
        <span>Cat is on duty</span>
        <input type="checkbox" data-enabled />
      </label>

      <button class="ghost" data-summon>Summon him now</button>
    </section>

    <footer>
      <div>5-minute break is fixed (it's pomodoro, not a negotiation).</div>
    </footer>

    <script src="lib/timer-logic.js"></script>
    <script src="popup.js"></script>
  </body>
</html>
